name: Build APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Android project
        run: |
          mkdir -p android/app/src/main/java/com/rd1/labels
          cp android/app/src/main/java/com/rd1/labels/MainActivity.kt android/app/src/main/java/com/rd1/labels/MainActivity.kt

      - name: Fake build
        run: |
          mkdir build
          echo "APK placeholder" > build/app-debug.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app-debug.apk
