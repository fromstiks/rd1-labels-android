name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 6 -type f | sort

      - name: Fake build
        run: |
          mkdir -p build
          echo "APK placeholder" > build/app-debug.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app-debug.apk
